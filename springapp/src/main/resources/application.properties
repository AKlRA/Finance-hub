spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/financehub}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
server.port=${PORT:8080}
jwt.secret.key=${JWT_SECRET_KEY:ThisIsAFallbackSecretKeyForLocalDevelopmentAndNeedsToBeLongEnoughForHS256Algorithm}
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:dummy@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:dummy}
razorpay.key.id=${RAZORPAY_KEY_ID:dummy_razorpay_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy_razorpay_key_secret}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true