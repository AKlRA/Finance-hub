<div class="px-4 py-6 sm:px-0 flex justify-center">
    <div class="w-full max-w-3xl">
        <div class="bg-card rounded-xl border border-gray-800 shadow-xl overflow-hidden">
            <div class="bg-gray-900/50 border-b border-gray-800 px-6 py-4 flex justify-between items-center">
                <h3 class="text-xl font-bold text-white mb-0 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Edit Savings Plan <span *ngIf="planId" class="ml-2 text-gray-400 font-normal">#{{planId}}</span>
                </h3>
                <button class="text-sm font-medium text-gray-400 hover:text-white transition-colors" (click)="goBack()">
                    &larr; Back to Plans
                </button>
            </div>

            <div class="p-6">
                <div *ngIf="errorMessage"
                    class="bg-red-900/50 border border-primary text-red-200 px-4 py-3 rounded-md mb-6 text-sm">
                    {{ errorMessage }}
                </div>
                <div *ngIf="successMessage"
                    class="bg-green-900/50 border border-green-500 text-green-200 px-4 py-3 rounded-md mb-6 text-sm">
                    {{ successMessage }}
                </div>

                <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-12">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mb-4"></div>
                    <p class="text-gray-400 text-sm">Loading plan details...</p>
                </div>

                <form [formGroup]="planForm" (ngSubmit)="onSubmit()" *ngIf="!isLoading" class="space-y-6">

                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-300 mb-2">Plan Name</label>
                        <input type="text" id="name" formControlName="name"
                            class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors">
                        <div class="text-primary text-xs mt-2"
                            *ngIf="planForm.get('name')?.touched && planForm.get('name')?.invalid">
                            <span *ngIf="planForm.get('name')?.errors?.required">Plan name is required.</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="goalAmount" class="block text-sm font-medium text-gray-300 mb-2">Goal Target /
                                Min Amount (₹)</label>
                            <div class="relative mt-1 rounded-md shadow-sm">
                                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                                    <span class="text-gray-500 sm:text-sm">₹</span>
                                </div>
                                <input type="number" id="goalAmount" formControlName="goalAmount"
                                    class="appearance-none block w-full pl-7 px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors">
                            </div>
                            <div class="text-primary text-xs mt-2"
                                *ngIf="planForm.get('goalAmount')?.touched && planForm.get('goalAmount')?.invalid">
                                <span *ngIf="planForm.get('goalAmount')?.errors?.required">Amount is required.</span>
                            </div>
                        </div>
                        <div>
                            <label for="timeFrame" class="block text-sm font-medium text-gray-300 mb-2">Time Frame
                                (Months)</label>
                            <input type="number" id="timeFrame" formControlName="timeFrame"
                                class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors">
                            <div class="text-primary text-xs mt-2"
                                *ngIf="planForm.get('timeFrame')?.touched && planForm.get('timeFrame')?.invalid">
                                <span *ngIf="planForm.get('timeFrame')?.errors?.required">Time frame is required.</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="riskLevel" class="block text-sm font-medium text-gray-300 mb-2">Risk
                                Level</label>
                            <select id="riskLevel" formControlName="riskLevel"
                                class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors">
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                            <div class="text-primary text-xs mt-2"
                                *ngIf="planForm.get('riskLevel')?.touched && planForm.get('riskLevel')?.invalid">
                                <span *ngIf="planForm.get('riskLevel')?.errors?.required">Risk level is required.</span>
                            </div>
                        </div>
                        <div>
                            <label for="status" class="block text-sm font-medium text-gray-300 mb-2">Status</label>
                            <select id="status" formControlName="status"
                                class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                            <div class="text-primary text-xs mt-2"
                                *ngIf="planForm.get('status')?.touched && planForm.get('status')?.invalid">
                                <span *ngIf="planForm.get('status')?.errors?.required">Status is required.</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label for="description"
                            class="block text-sm font-medium text-gray-300 mb-2">Description</label>
                        <textarea id="description" formControlName="description" rows="4"
                            class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors"></textarea>
                        <div class="text-primary text-xs mt-2"
                            *ngIf="planForm.get('description')?.touched && planForm.get('description')?.invalid">
                            <span *ngIf="planForm.get('description')?.errors?.required">Description is required.</span>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" [disabled]="isSubmitting"
                            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primaryHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-dark focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                            {{ isSubmitting ? 'Updating Plan...' : 'Update Savings Plan' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
