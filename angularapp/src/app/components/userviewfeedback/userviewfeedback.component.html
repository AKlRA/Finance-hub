<div class="px-4 py-6 sm:px-0">
    <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
        <h2 class="text-2xl font-bold text-white tracking-tight">My Feedback</h2>
        <button
            class="bg-primary hover:bg-primaryHover text-white px-4 py-2 rounded-md text-sm font-medium transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-dark"
            routerLink="/user/add-feedback">
            Add New Feedback
        </button>
    </div>

    <div *ngIf="errorMessage"
        class="bg-red-900/50 border border-primary text-red-200 px-4 py-3 rounded-md mb-6 shadow-sm">
        {{ errorMessage }}
    </div>

    <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-12">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mb-4"></div>
        <p class="text-gray-400 text-sm">Loading your feedback...</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" *ngIf="!isLoading && feedbacks.length > 0">
        <div class="bg-card rounded-xl border border-gray-800 shadow-lg overflow-hidden flex flex-col feedback-card"
            *ngFor="let feedback of feedbacks">

            <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-gray-900/30">
                <!-- ✅ Savings Plan Badge -->
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-900/50 text-blue-300 border border-blue-700">
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    {{ feedback.savingsPlan?.name || 'General Feedback' }}
                </span>

                <button
                    class="text-red-400 hover:text-red-300 hover:bg-red-900/40 p-1.5 rounded-md transition-colors border border-transparent hover:border-red-800"
                    title="Delete Feedback" (click)="deleteFeedback(feedback.feedbackId)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>

            <div class="p-5 flex-grow">
                <!-- Stars -->
                <div class="flex text-yellow-500 text-sm mb-3">
                    <span *ngFor="let star of getStars(feedback.rating)">★</span>
                    <span class="text-gray-500 text-xs ml-2 self-center">{{ feedback.rating }}/5</span>
                </div>
                <p class="text-gray-300 italic text-sm leading-relaxed mb-4">"{{ feedback.feedbackText }}"</p>
                <div class="text-right">
                    <small class="text-gray-500 text-xs">
                        Submitted on: {{ feedback.date | date:'mediumDate' }}
                    </small>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div class="flex flex-col items-center justify-center py-16 px-4 bg-card rounded-xl border border-gray-800 border-dashed"
        *ngIf="!isLoading && feedbacks.length === 0 && !errorMessage">
        <svg class="h-16 w-16 text-gray-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        <h4 class="text-lg font-medium text-white">No Feedback Found</h4>
        <p class="mt-1 text-sm text-gray-400">You haven't provided any feedback yet.</p>
        <button
            class="mt-6 bg-primary hover:bg-primaryHover text-white px-4 py-2 rounded-md text-sm font-medium transition-colors"
            routerLink="/user/add-feedback">Share Feedback</button>
    </div>
</div>
