<div class="fixed bottom-6 right-6 z-50">

    <!-- Chat Panel -->
    <div *ngIf="isOpen"
        class="absolute bottom-16 right-0 w-96 bg-card border border-gray-800 rounded-2xl shadow-2xl flex flex-col overflow-hidden"
        style="height: 520px;">

        <!-- Header -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800 bg-gray-900/80">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-primary/20 border border-primary/30 flex items-center justify-center">
                    <svg class="w-4 h-4 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1" />
                    </svg>
                </div>
                <div>
                    <p class="text-white text-sm font-semibold">Finance Assistant</p>
                    <div class="flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full"
                            [ngClass]="isCoolingDown ? 'bg-yellow-400' : 'bg-green-400'"></span>
                        <span class="text-gray-400 text-xs">{{ isCoolingDown ? 'Please wait...' : 'Online' }}</span>
                    </div>
                </div>
            </div>
            <button (click)="toggleChat()"
                class="text-gray-500 hover:text-white transition-colors p-1 rounded-lg hover:bg-gray-800">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Messages -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-thin">

            <!-- Initial typing indicator -->
            <div *ngIf="isTyping && messages.length === 0" class="flex items-start gap-2">
                <div class="w-7 h-7 rounded-full bg-primary/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-3.5 h-3.5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1" />
                    </svg>
                </div>
                <div class="bg-gray-800 rounded-2xl rounded-tl-sm px-4 py-3">
                    <div class="flex gap-1 items-center h-4">
                        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0s"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0.15s"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0.3s"></span>
                    </div>
                </div>
            </div>

            <!-- Messages loop -->
            <div *ngFor="let msg of messages" class="flex"
                [ngClass]="msg.role === 'user' ? 'justify-end' : 'justify-start'">

                <!-- Bot message -->
                <div *ngIf="msg.role === 'assistant'" class="flex items-start gap-2 max-w-[85%]">
                    <div class="w-7 h-7 rounded-full bg-primary/20 flex items-center justify-center flex-shrink-0 mt-1">
                        <svg class="w-3.5 h-3.5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1" />
                        </svg>
                    </div>
                    <div>
                        <div class="bg-gray-800 text-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 text-sm leading-relaxed whitespace-pre-line">
                            {{ msg.text }}
                        </div>
                        <p class="text-gray-600 text-xs mt-1 ml-1">{{ msg.time }}</p>
                    </div>
                </div>

                <!-- User message -->
                <div *ngIf="msg.role === 'user'" class="flex items-start gap-2 max-w-[85%]">
                    <div>
                        <div class="bg-primary text-white rounded-2xl rounded-tr-sm px-4 py-3 text-sm leading-relaxed">
                            {{ msg.text }}
                        </div>
                        <p class="text-gray-600 text-xs mt-1 text-right mr-1">{{ msg.time }}</p>
                    </div>
                </div>
            </div>

            <!-- Typing indicator while waiting -->
            <div *ngIf="isTyping && messages.length > 0" class="flex items-start gap-2">
                <div class="w-7 h-7 rounded-full bg-primary/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-3.5 h-3.5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-1" />
                    </svg>
                </div>
                <div class="bg-gray-800 rounded-2xl rounded-tl-sm px-4 py-3">
                    <div class="flex gap-1 items-center h-4">
                        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0s"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0.15s"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0.3s"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick suggestions — shown only at start -->
        <div *ngIf="messages.length <= 1 && !isTyping"
            class="px-4 py-2 border-t border-gray-800 flex gap-2 overflow-x-auto">
            <button
                *ngFor="let suggestion of ['Best plan for me', 'My application status', 'What is SIP?', 'Low risk plans']"
                (click)="userInput = suggestion; sendMessage()"
                class="flex-shrink-0 px-3 py-1.5 bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs rounded-full border border-gray-700 transition-colors whitespace-nowrap">
                {{ suggestion }}
            </button>
        </div>

        <!-- Input area -->
        <div class="px-4 py-3 border-t border-gray-800 bg-gray-900/50">
            <!-- Cooldown warning -->
            <div *ngIf="isCoolingDown"
                class="text-yellow-500 text-xs text-center mb-2">
                ⏳ Please wait a moment before sending another message...
            </div>
            <div class="flex items-center gap-2">
                <input
                    type="text"
                    [(ngModel)]="userInput"
                    (keydown)="onKeyDown($event)"
                    [disabled]="isCoolingDown"
                    placeholder="{{ isCoolingDown ? 'Please wait...' : 'Ask me anything about finance...' }}"
                    class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-primary transition-colors disabled:opacity-50">
                <button (click)="sendMessage()"
                    [disabled]="!userInput.trim() || isTyping || isCoolingDown"
                    class="w-10 h-10 bg-primary hover:bg-primaryHover disabled:opacity-40 disabled:cursor-not-allowed rounded-xl flex items-center justify-center transition-colors flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Floating toggle button -->
    <button (click)="toggleChat()"
        class="w-14 h-14 bg-primary hover:bg-primaryHover rounded-full shadow-lg shadow-primary/30 flex items-center justify-center transition-all hover:scale-110 relative">
        <svg *ngIf="!isOpen" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
        <svg *ngIf="isOpen" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
        <span *ngIf="!isOpen"
            class="absolute top-0 right-0 w-3 h-3 bg-green-400 rounded-full border-2 border-dark"></span>
    </button>
</div>
