
<nav class="w-full border-b border-gray-800/60 text-gray-200 relative"
    style="background: rgba(10,10,10,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
 
    <!-- Subtle top glow line matching home page primary color -->
    <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
 
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
 
            <!-- Logo -->
            <a routerLink="/home" class="flex items-center gap-2 flex-shrink-0">
                <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="font-extrabold text-xl tracking-tight text-white">Finance<span class="text-primary">Hub</span></span>
            </a>
 
            <!-- Links -->
            <div class="hidden md:flex items-center gap-1">
                <a routerLink="/home" routerLinkActive="text-white bg-white/5"
                    class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-lg font-medium transition-colors text-sm">
                    Home
                </a>
                <a routerLink="/login" routerLinkActive="text-white bg-white/5"
                    class="text-gray-400 hover:text-white hover:bg-white/5 px-4 py-2 rounded-lg font-medium transition-colors text-sm">
                    Login
                </a>
                <a routerLink="/register"
                    class="ml-2 px-4 py-2 bg-primary hover:bg-primaryHover text-white rounded-lg font-semibold transition-all hover:scale-105 text-sm shadow-lg shadow-primary/20">
                    Get Started
                </a>
            </div>
 
            <!-- Mobile menu button -->
            <div class="flex items-center md:hidden">
                <button (click)="toggleMobileMenu()" type="button" class="text-gray-300 hover:text-white focus:outline-none px-2 py-1">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path *ngIf="!isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        <path *ngIf="isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

        </div>

        <!-- Mobile Menu Dropdown -->
        <div *ngIf="isMobileMenuOpen" class="md:hidden mt-2 bg-card/90 backdrop-blur-xl border border-gray-800 rounded-lg p-4 flex flex-col space-y-3 absolute left-4 right-4 z-50">
             <a routerLink="/home" (click)="closeMobileMenu()" class="text-gray-300 hover:text-white font-medium">Home</a>
             <a routerLink="/login" (click)="closeMobileMenu()" class="text-gray-300 hover:text-white font-medium">Login</a>
             <a routerLink="/register" (click)="closeMobileMenu()" class="text-center bg-primary hover:bg-primaryHover text-white py-2 rounded-lg font-semibold">Get Started</a>
        </div>
    </div>
</nav>
