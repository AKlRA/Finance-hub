<aside class="w-64 bg-card border-r border-gray-800 flex flex-col h-full flex-shrink-0">

    <!-- Sidebar Header / Logo -->
    <div class="pt-6 pb-5 flex flex-col items-center justify-center border-b border-gray-800 space-y-2">
        <div class="text-white font-extrabold text-2xl tracking-tight flex items-center">
            <svg class="w-6 h-6 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Finance <span class="text-primary ml-1">Hub</span>
        </div>
        <a routerLink="/user/dashboard"
            class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-gray-800/80 text-gray-300 border border-gray-700 hover:text-white hover:border-gray-500 transition-colors">
            Customer Portal
        </a>
    </div>

    <!-- Menu Items -->
    <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-2">

        <!-- Dashboard -->
        <a routerLink="/user/dashboard" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Dashboard
        </a>

        <div class="px-4 mb-2 mt-4">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">My Account</p>
        </div>

        <!-- ✅ My Profile -->
        <a routerLink="/user/profile" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            My Profile
        </a>

        <a routerLink="/user/view-savings-plan" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Savings Plans
        </a>

        <a routerLink="/user/applied-plans" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            My Applications
        </a>

        <div class="px-4 mb-2 mt-4">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Support</p>
        </div>

        <a routerLink="/user/view-enquiry" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
            My Enquiries
        </a>

        <a routerLink="/user/view-feedback" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
            </svg>
            My Feedback
        </a>
    </nav>

    <!-- Logout -->
    <div class="p-4 border-t border-gray-800">
        <button (click)="logout()"
            class="w-full flex items-center justify-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-gray-800 hover:bg-primaryHover transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-dark focus:ring-primary">
            <svg class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Logout
        </button>
    </div>
</aside>
