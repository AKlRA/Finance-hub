<div class="px-4 py-6 sm:px-0 flex justify-center">
    <div class="w-full max-w-2xl">
        <div class="bg-card rounded-xl border border-gray-800 shadow-xl overflow-hidden">
            <div class="bg-gray-900/50 border-b border-gray-800 px-6 py-4 flex justify-between items-center">
                <h3 class="text-xl font-bold text-white mb-0 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                    </svg>
                    Provide Feedback
                </h3>
                <button class="text-sm font-medium text-gray-400 hover:text-white transition-colors" (click)="goBack()">
                    &larr; Back
                </button>
            </div>

            <div class="p-6">
                <div *ngIf="errorMessage"
                    class="bg-red-900/50 border border-primary text-red-200 px-4 py-3 rounded-md mb-6 text-sm">
                    {{ errorMessage }}
                </div>
                <div *ngIf="successMessage"
                    class="bg-green-900/50 border border-green-500 text-green-200 px-4 py-3 rounded-md mb-6 text-sm">
                    {{ successMessage }}
                </div>

                <form [formGroup]="feedbackForm" (ngSubmit)="onSubmit()" class="space-y-6">

                    <!-- Savings Plan Dropdown -->
                    <div>
                        <label for="savingsPlanId" class="block text-sm font-medium text-gray-300 mb-2">Savings Plan <span class="text-primary">*</span></label>
                        <select id="savingsPlanId" formControlName="savingsPlanId"
                            class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors">
                            <option value="" disabled>{{ isLoadingPlans ? 'Loading plans...' : 'Select a savings plan' }}</option>
                            <option *ngFor="let plan of savingsPlans" [value]="plan.savingsPlanId">
                                {{ plan.name }} - Rs.{{ plan.goalAmount }} ({{ plan.riskLevel }} Risk)
                            </option>
                        </select>
                        <div class="text-primary text-xs mt-2"
                            *ngIf="feedbackForm.get('savingsPlanId')?.touched && feedbackForm.get('savingsPlanId')?.invalid">
                            Please select a savings plan.
                        </div>
                    </div>

                    <div>
                        <label for="rating" class="block text-sm font-medium text-gray-300 mb-2">Rating (1 to 5)</label>
                        <input type="number" id="rating" formControlName="rating" min="1" max="5"
                            class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors"
                            placeholder="Enter a rating from 1 to 5">
                        <div class="text-primary text-xs mt-2"
                            *ngIf="feedbackForm.get('rating')?.touched && feedbackForm.get('rating')?.invalid">
                            <span *ngIf="feedbackForm.get('rating')?.errors?.required">Rating is required.</span>
                            <span *ngIf="feedbackForm.get('rating')?.errors?.min || feedbackForm.get('rating')?.errors?.max">Rating must be between 1 and 5.</span>
                        </div>
                    </div>

                    <div>
                        <label for="message" class="block text-sm font-medium text-gray-300 mb-2">Comments / Suggestions</label>
                        <textarea id="message" formControlName="message" rows="5"
                            class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors"
                            placeholder="What did you like? What can we improve?"></textarea>
                        <div class="text-primary text-xs mt-2"
                            *ngIf="feedbackForm.get('message')?.touched && feedbackForm.get('message')?.invalid">
                            <span *ngIf="feedbackForm.get('message')?.errors?.required">Feedback message is required.</span>
                            <span *ngIf="feedbackForm.get('message')?.errors?.minlength">Message must be at least 5 characters long.</span>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" [disabled]="isLoading"
                            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primaryHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-dark focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                            {{ isLoading ? 'Submitting...' : 'Submit Feedback' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
