<aside class="w-64 bg-card border-r border-gray-800 flex flex-col h-full flex-shrink-0">

    <!-- Sidebar Header / Logo -->
    <div class="pt-6 pb-5 flex flex-col items-center justify-center border-b border-gray-800 space-y-2">
        <div class="text-white font-extrabold text-2xl tracking-tight flex items-center">
            <svg class="w-6 h-6 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Finance <span class="text-primary ml-1">Hub</span>
        </div>
        <a routerLink="/manager/dashboard"
            class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-primary/10 text-primary border border-primary/20 hover:bg-primary/20 transition-colors">
            Manager Portal
        </a>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-2">

        <!-- Dashboard -->
        <a routerLink="/manager/dashboard" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Dashboard
        </a>

        <div class="px-4 mb-2 mt-4">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">My Account</p>
        </div>

        <!-- ✅ My Profile -->
        <a routerLink="/manager/profile" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            My Profile
        </a>

        <div class="px-4 mb-2 mt-4">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Management</p>
        </div>

        <!-- View Savings Plans -->
        <a routerLink="/manager/view-savings-plan" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            View Savings Plans
        </a>

        <!-- Create Savings Plan -->
        <a routerLink="/manager/create-savings-plan" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Create Savings Plan
        </a>

        <!-- Applications -->
        <a routerLink="/manager/view-application-form" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
            </svg>
            Applications
        </a>

        <div class="px-4 mt-6 mb-2">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Support</p>
        </div>

        <a routerLink="/manager/view-enquiries" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z" />
            </svg>
            Enquiries
        </a>

        <a routerLink="/manager/view-feedback" routerLinkActive="bg-primary text-white"
            class="text-gray-300 hover:bg-primaryHover hover:text-white flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors">
            <svg class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
            </svg>
            Feedback
        </a>
    </nav>

    <div class="p-4 border-t border-gray-800">
        <button (click)="logout()"
            class="w-full flex items-center justify-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-gray-800 hover:bg-primaryHover transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-dark focus:ring-primary">
            <svg class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Logout
        </button>
    </div>
</aside>
