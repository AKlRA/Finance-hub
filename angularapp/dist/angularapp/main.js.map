
 
<div class="min-h-[calc(100vh-4rem)] relative flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 overflow-hidden">
 
  <!-- Animated gradient mesh background -->
  <div class="absolute inset-0 bg-dark">
      <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-primary/20 rounded-full blur-[120px] animate-pulse"></div>
      <div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-blue-600/15 rounded-full blur-[120px] animate-pulse" style="animation-delay: 1s;"></div>
      <div class="absolute top-[40%] left-[50%] w-[350px] h-[350px] bg-primary/10 rounded-full blur-[100px] animate-pulse" style="animation-delay: 2s;"></div>
      <!-- Subtle grid overlay -->
      <div class="absolute inset-0 opacity-[0.03]"
          style="background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px); background-size: 40px 40px;">
      </div>
  </div>
 
  <!-- Form card -->
  <div class="relative z-10 max-w-md w-full bg-card/80 backdrop-blur-sm p-8 rounded-xl shadow-2xl border border-gray-800">
      <div class="text-center mb-8">
          <div class="flex items-center justify-center mb-4">
              <svg class="w-8 h-8 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span class="text-white font-extrabold text-2xl">Finance<span class="text-primary">Hub</span></span>
          </div>
          <h2 class="text-3xl font-bold text-white tracking-tight">Sign In</h2>
          <p class="mt-2 text-sm text-gray-400">Log in to your Finance Hub account</p>
      </div>
 
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <div *ngIf="errorMessage"
              class="bg-red-900/50 border border-primary text-red-200 px-4 py-3 rounded-md text-sm">
              {{ errorMessage }}
          </div>
 
          <div>
              <label for="email" class="block text-sm font-medium text-gray-300">Email Address</label>
              <div class="mt-1">
                  <input type="email" id="email" formControlName="email"
                      class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors"
                      placeholder="Enter your email">
              </div>
              <div class="text-primary text-xs mt-1"
                  *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
                  <span *ngIf="loginForm.get('email')?.errors?.required">Email is required.</span>
                  <span *ngIf="loginForm.get('email')?.errors?.email">Please enter a valid email.</span>
              </div>
          </div>
 
          <div>
              <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
              <div class="mt-1">
                  <input type="password" id="password" formControlName="password"
                      class="appearance-none block w-full px-3 py-2 border border-gray-700 bg-dark rounded-md text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors"
                      placeholder="Enter your password">
              </div>
              <div class="text-primary text-xs mt-1"
                  *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                  <span *ngIf="loginForm.get('password')?.errors?.required">Password is required.</span>
              </div>
          </div>
 
          <div>
              <button type="submit" [disabled]="isLoading"
                  class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primaryHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-dark focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                  {{ isLoading ? 'Logging in...' : 'Login' }}
              </button>
          </div>
 
          <div class="text-center text-sm">
              <p class="text-gray-400">Don't have an account?
                  <a routerLink="/register"
                      class="font-medium text-primary hover:text-primaryHover transition-colors">Register here</a>
              </p>
          </div>
      </form>
  </div>
</div>
